<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Clicker Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b1424;
            --card-bg: #152540;
            --tg-blue: #0088cc;
            --text-color: #ffffff;
            --text-gray: #8a99ad;
            --gold: #ffd700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 95px;
            position: relative;
        }

        .page {
            display: none;
            animation: fadeIn 0.25s ease-out;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Üst Panel */
        .header-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--card-bg), #1a2f52);
            padding: 12px 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--tg-blue);
            object-fit: cover;
            background: #203354;
        }

        .user-info h3 {
            font-size: 14px;
            font-weight: 600;
        }

        .user-info p {
            font-size: 11px;
            color: var(--tg-blue);
            font-weight: 500;
        }

        /* Ana Səhifə & Klik Mexanizmi */
        .clicker-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 30px;
            position: relative;
        }

        .balance-title {
            font-size: 13px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .balance-value {
            font-size: 44px;
            font-weight: 700;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 4px 15px rgba(0,136,204,0.3);
        }

        /* Böyük Coin Düyməsi */
        .coin-wrapper {
            position: relative;
            width: 210px;
            height: 210px;
            perspective: 1000px;
        }

        .coin-btn {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #ffe066 0%, #f5b041 50%, #d35400 100%);
            box-shadow: 0 15px 35px rgba(211, 84, 0, 0.4), inset 0 0 15px rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.05s ease;
            border: 6px solid rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 5;
        }

        .coin-btn:active {
            transform: scale(0.92) rotateX(10deg);
        }

        .coin-btn i {
            font-size: 95px;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.25);
        }

        /* Uçan +1 Animasiyası */
        .plus-one {
            position: absolute;
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 10;
            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(1.2); }
        }

        /* Kiçik Sıçrayan Coinlər (Particles) */
        .coin-particle {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #ffd700;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            pointer-events: none;
            z-index: 9;
            animation: particleScatter 0.6s ease-out forwards;
        }

        @keyframes particleScatter {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0.4); opacity: 0; }
        }

        /* Tapşırıqlar */
        .section-title {
            font-size: 19px;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .task-card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .task-detail {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .task-name {
            font-size: 14px;
            font-weight: 500;
        }

        .task-reward {
            font-size: 12px;
            color: var(--tg-blue);
            font-weight: 600;
        }

        .btn-check {
            background: var(--tg-blue);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 136, 204, 0.25);
        }

        /* Liderlər (Həqiqi) */
        .leader-list {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .leader-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .leader-rank {
            width: 35px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-gray);
        }

        /* 1, 2, 3-cü yerlərin qızılı rəngi */
        .leader-item:nth-child(1) .leader-rank,
        .leader-item:nth-child(2) .leader-rank,
        .leader-item:nth-child(3) .leader-rank {
            color: var(--gold) !important;
            font-size: 18px;
        }

        .leader-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-right: 12px;
            object-fit: cover;
            background: #203354;
        }

        .leader-name {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
        }

        .leader-coins {
            font-weight: 600;
            color: var(--gold);
            font-size: 14px;
        }

        /* Profil */
        .profile-card {
            background: linear-gradient(135deg, var(--card-bg) 0%, #172a4a 100%);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .profile-card .user-avatar {
            width: 85px;
            height: 85px;
            border-width: 3px;
            margin-bottom: 12px;
            box-shadow: 0 0 20px rgba(0,136,204,0.3);
        }

        .profile-username {
            font-size: 19px;
            font-weight: 600;
        }

        .profile-status {
            font-size: 12px;
            color: var(--tg-blue);
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .stats-grid {
            background: rgba(11, 21, 36, 0.5);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }

        .stat-label { color: var(--text-gray); font-size: 13px; }
        .stat-value { font-weight: 600; font-size: 16px; }

        /* Göy Rəngli Keçid Menüsü (Navbar) */
        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 75px;
            background: #0d192d;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-gray);
            font-size: 11px;
            font-weight: 500;
            gap: 4px;
            cursor: pointer;
            transition: color 0.2s ease;
            width: 22%;
        }

        .nav-item i {
            font-size: 19px;
            transition: transform 0.2s ease;
        }

        .nav-item.active {
            color: var(--tg-blue);
        }

        .nav-item.active i {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="app-container" id="main-container">

        <div id="top-header" class="header-profile">
            <img src="" alt="PP" class="user-avatar" id="header-avatar">
            <div class="user-info">
                <h3 id="header-name">Yüklənir...</h3>
                <p>Telegram Member</p>
            </div>
        </div>

        <div id="home" class="page active">
            <div class="clicker-container">
                <div class="balance-title">Balansınız</div>
                <div class="balance-value">
                    <i class="fa-solid fa-coins" style="color: #ffd700;"></i>
                    <span id="coin-count">0</span>
                </div>
                
                <div class="coin-wrapper">
                    <div class="coin-btn" id="main-coin-btn">
                        <i class="fa-solid fa-bitcoin-sign"></i>
                    </div>
                </div>
            </div>
        </div>

        <div id="tasks" class="page">
            <h2 class="section-title">Tapşırıqlar</h2>
            <div class="task-card">
                <div class="task-detail">
                    <span class="task-name">Kanala Qatıl</span>
                    <span class="task-reward">+100 Coin</span>
                </div>
                <button class="btn-check" onclick="verifyTask(this, 100)">Yoxla</button>
            </div>
        </div>

        <div id="leaderboard" class="page">
            <h2 class="section-title">Liderlər sıralaması</h2>
            <div class="leader-list" id="leader-list-container">
                </div>
        </div>

        <div id="profile" class="page">
            <div class="profile-card">
                <img src="" alt="PP" class="user-avatar" id="profile-avatar">
                <div class="profile-username" id="profile-name">Yüklənir...</div>
                <div class="profile-status">Premium Dizayn</div>
                
                <div class="stats-grid">
                    <div>
                        <span class="stat-label">Ümumi Coin</span><br>
                        <span class="stat-value" id="profile-coins" style="color:var(--gold)">0</span>
                    </div>
                    <div style="text-align: right;">
                        <span class="stat-label">İstifadəçi ID</span><br>
                        <span class="stat-value" id="profile-id" style="color: var(--text-gray);">#0</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <nav class="navbar">
        <div class="nav-item active" onclick="switchTab('home')">
            <i class="fa-solid fa-house"></i>
            <span>Ana Səhifə</span>
        </div>
        <div class="nav-item" onclick="switchTab('tasks')">
            <i class="fa-solid fa-tasks"></i>
            <span>Tapşırıqlar</span>
        </div>
        <div class="nav-item" onclick="switchTab('leaderboard')">
            <i class="fa-solid fa-trophy"></i>
            <span>Liderlər</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile')">
            <i class="fa-solid fa-user"></i>
            <span>Profilim</span>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let coins = parseInt(localStorage.getItem('my_tracked_coins')) || 0;
        document.getElementById('coin-count').innerText = coins;

        const defaultAvatar = "https://api.dicebear.com/7.x/bottts/svg?seed=tguser";
        let currentUser = {
            id: "12345678",
            name: "Yerli İstifadəçi",
            photo: defaultAvatar,
            coins: coins
        };

        // Telegramdan real məlumatları oxuyuruq
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const tgUser = tg.initDataUnsafe.user;
            currentUser.id = tgUser.id.toString();
            currentUser.name = `${tgUser.first_name} ${tgUser.last_name || ''}`.trim();
            currentUser.photo = tgUser.photo_url || defaultAvatar;
        }

        // Profilləri yeniləyirik
        function updateUIProfiles() {
            document.getElementById('header-name').innerText = currentUser.name;
            document.getElementById('header-avatar').src = currentUser.photo;
            document.getElementById('profile-name').innerText = currentUser.name;
            document.getElementById('profile-avatar').src = currentUser.photo;
            document.getElementById('profile-id').innerText = `#${currentUser.id}`;
            document.getElementById('profile-coins').innerText = coins;
        }
        updateUIProfiles();

        // 🌟 Premium Animasiyalı Klik Funksiyası
        const coinBtn = document.getElementById('main-coin-btn');
        const container = document.getElementById('main-container');

        coinBtn.addEventListener('click', (e) => {
            coins += 1;
            document.getElementById('coin-count').innerText = coins;
            localStorage.setItem('my_tracked_coins', coins);
            currentUser.coins = coins;
            
            // Öz məlumatımızı lokal siyahıya sinxronizasiya edirik (Real Liderlər effekti üçün)
            saveToLocalGlobalList(currentUser);

            // 1. "+1" mətni animasiyası
            const plus = document.createElement('div');
            plus.classList.add('plus-one');
            plus.innerText = '+1';
            
            // Kliklənən yerin koordinatlarını tapırıq
            plus.style.left = `${e.clientX - 15}px`;
            plus.style.top = `${e.clientY - 30}px`;
            document.body.appendChild(plus);

            setTimeout(() => plus.remove(), 800);

            // 2. Kiçik qızılı coinlərin ətrafa saçılması (Particles)
            for (let i = 0; i < 6; i++) {
                const particle = document.createElement('div');
                particle.classList.add('coin-particle');
                
                // Təsadüfi bucaq və məsafə nizamlanması
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 50;
                const mx = Math.cos(angle) * distance;
                const my = Math.sin(angle) * distance;

                particle.style.setProperty('--mx', `${mx}px`);
                particle.style.setProperty('--my', `${my}px`);
                particle.style.left = `${e.clientX - 5}px`;
                particle.style.top = `${e.clientY - 5}px`;

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 600);
            }
        });

        // Həqiqi İştirakçıların Lokal Massivdə Saxlanması Mexanizmi
        // Real production-da bu hissə Fetch API ilə verilənlər bazasından (MongoDB/PostgreSQL) gəlir.
        function saveToLocalGlobalList(userObj) {
            let userList = JSON.parse(localStorage.getItem('global_leaderboard_users')) || [];
            const index = userList.findIndex(u => u.id === userObj.id);
            if (index !== -1) {
                userList[index].coins = userObj.coins;
            } else {
                userList.push(userObj);
            }
            localStorage.setItem('global_leaderboard_users', JSON.stringify(userList));
        }
        
        // İlk açılışda cari istifadəçini qeydiyyata alırıq
        saveToLocalGlobalList(currentUser);

        // Keçid tənzimləmələri
        function switchTab(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');

            if(pageId === 'profile') {
                document.getElementById('top-header').style.display = 'none';
                document.getElementById('profile-coins').innerText = coins;
            } else {
                document.getElementById('top-header').style.display = 'flex';
            }

            if(pageId === 'leaderboard') {
                loadRealLeaderboard();
            }
        }

        // Həqiqi Liderlər Siyahısının Yüklənməsi
        function loadRealLeaderboard() {
            let userList = JSON.parse(localStorage.getItem('global_leaderboard_users')) || [];
            
            // Əgər tətbiqdə hələ tək siz varsınızsa, siyahı boş qalmasın deyə bir neçə realistik iştirakçı əlavə edək
            if (userList.length <= 1) {
                userList = [
                    currentUser,
                    { id: "987654", name: "Murad Əliyev", photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=Murad", coins: 450 },
                    { id: "543210", name: "Leyla M-ova", photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=Leyla", coins: 280 }
                ];
                localStorage.setItem('global_leaderboard_users', JSON.stringify(userList));
            }

            // Coin sayına görə sıralayırıq (çoxdan aza)
            userList.sort((a, b) => b.coins - a.coins);

            const container = document.getElementById('leader-list-container');
            container.innerHTML = "";

            userList.forEach((u, idx) => {
                const itemHtml = `
                    <div class="leader-item">
                        <div class="leader-rank">${idx + 1}</div>
                        <img src="${u.photo}" class="leader-avatar" alt="pp">
                        <div class="leader-name">${u.name} ${u.id === currentUser.id ? '<span style="color:var(--tg-blue); font-size:11px;">(Sən)</span>' : ''}</div>
                        <div class="leader-coins">${u.coins} 🪙</div>
                    </div>
                `;
                container.innerHTML += itemHtml;
            });
        }

        function verifyTask(btn, rwd) {
            if(btn.innerText === "Yoxla") {
                btn.innerText = "Yoxlanılır...";
                btn.style.background = "#444";
                setTimeout(() => {
                    btn.innerText = "Tamamlandı";
                    btn.style.background = "#2ecc71";
                    btn.disabled = true;
                    coins += rwd;
                    document.getElementById('coin-count').innerText = coins;
                    localStorage.setItem('my_tracked_coins', coins);
                    currentUser.coins = coins;
                    saveToLocalGlobalList(currentUser);
                }, 1500);
            }
        }
    </script>
</body>
</html>
