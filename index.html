<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Mini App</title>
    <!-- Telegram Web Apps API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Google Fonts & FontAwesome İkonları üçün -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b1526;
            --card-bg: #152540;
            --tg-blue: #0088cc;
            --text-color: #ffffff;
            --text-gray: #8a99ad;
            --gold: #ffd700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Səhifə Struktur */
        .app-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 90px;
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium Üst Panel */
        .header-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--card-bg), #1e355c);
            padding: 12px 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--tg-blue);
            object-fit: cover;
            background: #253550;
        }

        .user-info h3 {
            font-size: 15px;
            font-weight: 600;
        }

        .user-info p {
            font-size: 12px;
            color: var(--tg-blue);
            font-weight: 500;
        }

        /* Ana Səhifə / Clicker */
        .clicker-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 40px;
        }

        .balance-title {
            font-size: 14px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-value {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 4px 10px rgba(0,136,204,0.3);
        }

        .coin-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffcc00 0%, #d4af37 60%, #aa7c11 100%);
            box-shadow: 0 0 40px rgba(253, 215, 0, 0.4), inset 0 0 20px rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.05s ease;
            border: 8px solid rgba(255, 255, 255, 0.1);
        }

        .coin-btn:active {
            transform: scale(0.92);
        }

        .coin-btn i {
            font-size: 90px;
            color: #fff;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        /* Tapşırıqlar Bölməsi */
        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .task-card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .task-detail {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .task-name {
            font-size: 15px;
            font-weight: 500;
        }

        .task-reward {
            font-size: 13px;
            color: var(--tg-blue);
            font-weight: 600;
        }

        .btn-check {
            background: var(--tg-blue);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 136, 204, 0.3);
            transition: opacity 0.2s;
        }

        .btn-check:opacity {
            opacity: 0.9;
        }

        /* Liderlər Bölməsi */
        .leader-list {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
        }

        .leader-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .leader-rank {
            width: 30px;
            font-size: 16px;
            font-weight: 700;
        }

        .leader-rank.gold {
            color: var(--gold);
            font-size: 18px;
        }

        .leader-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            margin-right: 12px;
            background: #253550;
        }

        .leader-name {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
        }

        .leader-coins {
            font-weight: 600;
            color: var(--gold);
            font-size: 14px;
        }

        /* Profil Səhifəsi */
        .profile-card {
            background: linear-gradient(135deg, var(--card-bg) 0%, #1a3054 100%);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .profile-card .user-avatar {
            width: 90px;
            height: 90px;
            border-width: 3px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0,136,204,0.4);
        }

        .profile-username {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile-status {
            font-size: 13px;
            color: var(--tg-blue);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        .stat-box {
            background: rgba(11, 21, 38, 0.6);
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-label {
            color: var(--text-gray);
            font-size: 13px;
        }

        .stat-value {
            font-weight: 600;
            font-size: 16px;
        }

        /* Alt Naviqasiya Menüsü (Göy Göstərici İlə) */
        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 75px;
            background: #0e1a30;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            gap: 5px;
            cursor: pointer;
            transition: color 0.3s ease;
            width: 22%;
            position: relative;
        }

        .nav-item i {
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .nav-item.active {
            color: var(--tg-blue);
        }

        .nav-item.active i {
            transform: translateY(-4px);
            color: var(--tg-blue);
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- ÜST PANEL (Yalnız Ana səhifə və Tapşırıqlarda görünsün deyə dinamik nizamlanacaq) -->
        <div id="top-header" class="header-profile">
            <img src="" alt="Avatar" class="user-avatar" id="header-avatar">
            <div class="user-info">
                <h3 id="header-name">İstifadəçi</h3>
                <p>Premium Member</p>
            </div>
        </div>

        <!-- 1. ANA SƏHİFƏ -->
        <div id="home" class="page active">
            <div class="clicker-container">
                <div class="balance-title">Balansınız</div>
                <div class="balance-value">
                    <i class="fa-solid fa-coins" style="color: #ffd700;"></i>
                    <span id="coin-count">0</span>
                </div>
                <div class="coin-btn" onclick="handleClick()">
                    <i class="fa-solid fa-bolt"></i>
                </div>
            </div>
        </div>

        <!-- 2. TAPŞIRIQLAR -->
        <div id="tasks" class="page">
            <h2 class="section-title">Tapşırıqlar</h2>
            <div class="task-card">
                <div class="task-detail">
                    <span class="task-name">Kanala Qatıl</span>
                    <span class="task-reward">+100 Coin</span>
                </div>
                <button class="btn-check" onclick="verifyTask(this, 100)">Yoxla</button>
            </div>
            <div class="task-card">
                <div class="task-detail">
                    <span class="task-name">Rəsmi Qrupa Qoşul</span>
                    <span class="task-reward">+150 Coin</span>
                </div>
                <button class="btn-check" onclick="verifyTask(this, 150)">Yoxla</button>
            </div>
        </div>

        <!-- 3. LİDERLƏR -->
        <div id="leaderboard" class="page">
            <h2 class="section-title">Liderlər sıralaması</h2>
            <div class="leader-list" id="leader-list-container">
                <!-- Dinamik doldurulacaq -->
            </div>
        </div>

        <!-- 4. PROFİLİM -->
        <div id="profile" class="page">
            <div class="profile-card">
                <img src="" alt="Avatar" class="user-avatar" id="profile-avatar">
                <div class="profile-username" id="profile-name">Telegram User</div>
                <div class="profile-status">Premium Status</div>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="stat-label">Ümumi Coin</span>
                        <span class="stat-value" id="profile-coins" style="color:var(--gold)">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">İstifadəçi ID</span>
                        <span class="stat-value" id="profile-id" style="color: var(--text-gray);">#000000</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- ALT NAVİQASİYA MENÜSÜ -->
    <nav class="navbar">
        <div class="nav-item active" onclick="switchTab('home')">
            <i class="fa-solid fa-house"></i>
            <span>Ana Səhifə</span>
        </div>
        <div class="nav-item" onclick="switchTab('tasks')">
            <i class="fa-solid fa-tasks"></i>
            <span>Tapşırıqlar</span>
        </div>
        <div class="nav-item" onclick="switchTab('leaderboard')">
            <i class="fa-solid fa-trophy"></i>
            <span>Liderlər</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile')">
            <i class="fa-solid fa-user"></i>
            <span>Profilim</span>
        </div>
    </nav>

    <script>
        // Telegram WebApp Başlatma
        const tg = window.Telegram.WebApp;
        tg.expand(); // tətbiqi tam ekran edir

        let coins = parseInt(localStorage.getItem('coins')) || 0;
        document.getElementById('coin-count').innerText = coins;

        // Telegram data inteqrasiyası
        const user = tg.initDataUnsafe?.user;
        const defaultAvatar = "https://api.dicebear.com/7.x/bottts/svg?seed=premium"; // Əgər pp yoxdursa default şəkil

        if (user) {
            const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
            const photoUrl = user.photo_url || defaultAvatar;

            // Elementləri doldururuq
            document.getElementById('header-name').innerText = fullName;
            document.getElementById('header-avatar').src = photoUrl;
            document.getElementById('profile-name').innerText = fullName;
            document.getElementById('profile-avatar').src = photoUrl;
            document.getElementById('profile-id').innerText = `#${user.id}`;
        } else {
            // Brauzerdə test etmək üçün default dəyərlər
            document.getElementById('header-avatar').src = defaultAvatar;
            document.getElementById('profile-avatar').src = defaultAvatar;
        }

        // Səhifə dəyişmə mexanizmi
        function switchTab(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));

            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');

            // Profilim bölməsində yuxarıdakı mini headeri gizlədirik ki premium kart görünsün
            if(pageId === 'profile') {
                document.getElementById('top-header').style.display = 'none';
                document.getElementById('profile-coins').innerText = coins;
            } else {
                document.getElementById('top-header').style.display = 'flex';
            }

            if(pageId === 'leaderboard') {
                loadLeaderboard();
            }
        }

        // Coin Klikləmə Funksiyası
        function handleClick() {
            coins += 1;
            document.getElementById('coin-count').innerText = coins;
            localStorage.setItem('coins', coins);
            
            // Hər klikdə məlumatı backend-ə göndərmək üçün bura API istəyi əlavə edilə bilər
        }

        // Tapşırıq yoxlama
        function verifyTask(button, reward) {
            if(button.innerText === "Yoxla") {
                button.innerText = "Yoxlanılır...";
                button.style.background = "#555";
                
                setTimeout(() => {
                    button.innerText = "Tamamlandı";
                    button.style.background = "#2ecc71";
                    button.disabled = true;
                    coins += reward;
                    document.getElementById('coin-count').innerText = coins;
                    localStorage.setItem('coins', coins);
                    tg.showAlert(`Təbriklər! +${reward} coin balansınıza əlavə olundu.`);
                }, 2000);
            }
        }

        // Liderlər Cədvəlinin Dinamik Yaradılması
        function loadLeaderboard() {
            // Dummy Data (Backend qoşulanda buraya fetch istəyi yazılacaq)
            const leaders = [
                { name: "Emin M.", coins: 15400, photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=Emin" },
                { name: "Aysel K.", coins: 12900, photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=Aysel" },
                { name: "Rəşad S.", coins: 7400, photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=Reshad" },
                { name: "Fidan H.", coins: 5100, photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=Fidan" }
            ];

            // Çeşidləmə
            leaders.sort((a, b) => b.coins - a.coins);

            const container = document.getElementById('leader-list-container');
            container.innerHTML = "";

            leaders.forEach((leader, index) => {
                const rank = index + 1;
                const isGold = rank <= 3 ? "gold" : "";
                
                const itemHtml = `
                    <div class="leader-item">
                        <div class="leader-rank ${isGold}">${rank}</div>
                        <img src="${leader.photo}" class="leader-avatar" alt="pp">
                        <div class="leader-name">${leader.name}</div>
                        <div class="leader-coins">${leader.coins} 🪙</div>
                    </div>
                `;
                container.innerHTML += itemHtml;
            });
        }
    </script>
</body>
  </html>
